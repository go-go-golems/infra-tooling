name: publish-ghcr-image

on:
  workflow_call:
    inputs:
      dockerfile:
        required: false
        type: string
        default: ./Dockerfile
      build_context:
        required: false
        type: string
        default: .
      test_command:
        required: false
        type: string
        default: go test ./...
      go_version_file:
        required: false
        type: string
        default: go.mod
      image_name:
        required: false
        type: string
        default: ""
      platforms:
        required: false
        type: string
        default: linux/amd64
      gitops_target_config:
        required: false
        type: string
        default: deploy/gitops-targets.json
      gitops_target:
        required: false
        type: string
        default: ""
      gitops_all_targets:
        required: false
        type: boolean
        default: true
      push_image:
        required: false
        type: boolean
        default: true
      open_gitops_pr:
        required: false
        type: boolean
        default: true
      tooling_repository:
        required: false
        type: string
        default: go-go-golems/infra-tooling
      tooling_ref:
        required: false
        type: string
        default: main
      gitops_pr_token_source:
        required: false
        type: string
        default: vault
      vault_addr:
        required: false
        type: string
        default: https://vault.yolo.scapegoat.dev
      vault_auth_path:
        required: false
        type: string
        default: github-actions
      vault_role:
        required: false
        type: string
        default: ""
      vault_audience:
        required: false
        type: string
        default: https://vault.yolo.scapegoat.dev
      vault_secret_path:
        required: false
        type: string
        default: ""
      vault_secret_field:
        required: false
        type: string
        default: token
    secrets:
      GITOPS_PR_TOKEN:
        required: false

permissions:
  contents: read
  packages: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.compute.outputs.image_ref }}
      image_tag: ${{ steps.compute.outputs.image_tag }}
      image_name: ${{ steps.compute.outputs.image_name }}

    steps:
      - name: Check out caller repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go_version_file }}
          cache: true

      - name: Run tests
        shell: bash
        run: ${{ inputs.test_command }}

      - name: Compute image coordinates
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          image_name="${{ inputs.image_name }}"
          if [ -z "${image_name}" ]; then
            image_name="ghcr.io/${GITHUB_REPOSITORY}"
          fi
          image_tag="sha-${GITHUB_SHA::7}"
          image_ref="${image_name}:${image_tag}"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.compute.outputs.image_name }}
          tags: |
            type=raw,value=${{ steps.compute.outputs.image_tag }}
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Log in to GHCR
        if: inputs.push_image
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  gitops-pr:
    name: Open GitOps PR
    needs: publish
    if: inputs.open_gitops_pr
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.open.outputs.changed }}
      changed_targets: ${{ steps.open.outputs.changed_targets }}
      branch_names: ${{ steps.open.outputs.branch_names }}
      pr_numbers: ${{ steps.open.outputs.pr_numbers }}

    steps:
      - name: Check out caller repository
        uses: actions/checkout@v5

      - name: Check out infra-tooling repository
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.tooling_repository }}
          ref: ${{ inputs.tooling_ref }}
          path: .infra-tooling

      - name: Validate GitOps credential configuration
        shell: bash
        env:
          GITOPS_PR_TOKEN_SOURCE: ${{ inputs.gitops_pr_token_source }}
          VAULT_ROLE: ${{ inputs.vault_role }}
          VAULT_SECRET_PATH: ${{ inputs.vault_secret_path }}
          LEGACY_GITOPS_PR_TOKEN: ${{ secrets.GITOPS_PR_TOKEN }}
        run: |
          set -euo pipefail
          case "${GITOPS_PR_TOKEN_SOURCE}" in
            vault)
              if [ -z "${VAULT_ROLE}" ] || [ -z "${VAULT_SECRET_PATH}" ]; then
                echo "gitops_pr_token_source=vault requires vault_role and vault_secret_path."
                exit 1
              fi
              ;;
            secret)
              if [ -z "${LEGACY_GITOPS_PR_TOKEN}" ]; then
                echo "gitops_pr_token_source=secret requires the legacy GITOPS_PR_TOKEN secret."
                exit 1
              fi
              ;;
            *)
              echo "unsupported gitops_pr_token_source: ${GITOPS_PR_TOKEN_SOURCE}"
              exit 1
              ;;
          esac

      - name: Read GitOps PR token from Vault
        if: inputs.gitops_pr_token_source == 'vault'
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ inputs.vault_addr }}
          method: jwt
          path: ${{ inputs.vault_auth_path }}
          role: ${{ inputs.vault_role }}
          jwtGithubAudience: ${{ inputs.vault_audience }}
          exportToken: true
          secrets: |
            ${{ inputs.vault_secret_path }} ${{ inputs.vault_secret_field }} | GITOPS_PR_TOKEN

      - name: Export legacy GitOps PR token
        if: inputs.gitops_pr_token_source == 'secret'
        shell: bash
        env:
          LEGACY_GITOPS_PR_TOKEN: ${{ secrets.GITOPS_PR_TOKEN }}
        run: |
          set -euo pipefail
          echo "GITOPS_PR_TOKEN=${LEGACY_GITOPS_PR_TOKEN}" >> "$GITHUB_ENV"
          echo "::add-mask::${LEGACY_GITOPS_PR_TOKEN}"

      - name: Open GitOps pull requests for published image
        id: open
        uses: ./.infra-tooling/actions/open-gitops-pr
        with:
          config: ${{ inputs.gitops_target_config }}
          image: ${{ needs.publish.outputs.image_ref }}
          target: ${{ inputs.gitops_target }}
          all_targets: ${{ inputs.gitops_all_targets }}
          push: true
          open_pr: true
          git_author_name: github-actions[bot]
          git_author_email: 41898282+github-actions[bot]@users.noreply.github.com
